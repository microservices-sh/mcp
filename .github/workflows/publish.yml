name: Publish

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  npm:
    name: npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check npm
        run: npm --version

      - name: Test
        run: pnpm test

      - name: Smoke package
        run: pnpm smoke

      - name: Check npm version
        id: version
        shell: bash
        run: |
          package_name="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).name")"
          package_version="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          echo "package_name=${package_name}" >> "$GITHUB_OUTPUT"
          echo "package_version=${package_version}" >> "$GITHUB_OUTPUT"

          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "${package_name}@${package_version} is already published."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.version.outputs.published != 'true'
        run: npm publish --access public

      - name: Published version
        if: steps.version.outputs.published != 'true'
        shell: bash
        run: |
          package="${{ steps.version.outputs.package_name }}@${{ steps.version.outputs.package_version }}"
          for attempt in {1..12}; do
            if published_version="$(npm view "$package" version 2>/dev/null)"; then
              test "$published_version" = "${{ steps.version.outputs.package_version }}"
              exit 0
            fi

            echo "Waiting for npm registry propagation for ${package} (${attempt}/12)..."
            sleep 10
          done

          npm view "$package" version

      - name: Install mcp-publisher
        shell: bash
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
          chmod +x mcp-publisher

      - name: Validate MCP registry metadata
        run: ./mcp-publisher validate server.json

      - name: Publish to MCP Registry
        env:
          MCP_PRIVATE_KEY: ${{ secrets.MCP_PRIVATE_KEY }}
        shell: bash
        run: |
          test -n "$MCP_PRIVATE_KEY"
          ./mcp-publisher login dns --domain microservices.sh --private-key "$MCP_PRIVATE_KEY"
          ./mcp-publisher publish
